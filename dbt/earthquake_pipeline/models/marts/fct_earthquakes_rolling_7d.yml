models:
  - name: fct_earthquakes_rolling_7d
    description: A fact table that calculates a 7-day rolling average of the number of earthquakes, including the current day and previous 6 days.
    columns:
      - name: event_date
        description: The date of the earthquake events.
        data_tests:
          - not_null
          - unique
      - name: num_earthquakes
        description: The total number of earthquake events that occurred on the given date.
      - name: avg_num_earthquakes_rolling_7d
        description: The 7-day rolling average of the number of earthquakes, including the current day and previous 6 days.
        data_tests:
          - not_null
          - is_positive